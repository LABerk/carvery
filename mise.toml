[tools]
dotnet = "10"
node = "24"

[tasks.dev]
description = "Start both the API and frontend"
depends = ["api:watch", "web:dev"]

[tasks.clean]
description = "Clean API and frontend build artifacts"
depends = ["api:clean", "web:clean"]

[tasks.install]
description = "Install API and frontend dependencies"
depends = ["api:install", "web:install"]

[tasks.test]
description = "Run all tests"
depends = ["api:test"]

[tasks."docker:up"]
description = "Start Docker containers (SQL Server)"
run = "docker compose up -d"

[tasks."docker:down"]
description = "Stop Docker containers"
run = "docker compose down"

[tasks."docker:status"]
description = "Check Docker container status"
run = 'docker ps --filter "name=carvery-sql" --format "{{.Names}}|{{.Status}}"'

[tasks."api:test"]
description = "Run API tests"
run = "dotnet test .tests/Carvery.Api.Tests/Carvery.Api.Tests.csproj"

[tasks."db:update"]
description = "Apply EF migrations to the local database"
run = 'powershell -NoProfile -Command "dotnet tool restore; dotnet ef database update --project packages/Carvery.Database/Carvery.Database.csproj --startup-project apps/Carvery.Api/Api.csproj"'

[tasks."db:list"]
description = "List EF migrations"
run = 'powershell -NoProfile -Command "dotnet tool restore; dotnet ef migrations list --project packages/Carvery.Database/Carvery.Database.csproj --startup-project apps/Carvery.Api/Api.csproj"'

[tasks."db:add-migration"]
description = "Add a new EF migration (set MIGRATION_NAME env var, defaults to NewMigration)"
run = 'powershell -NoProfile -Command "dotnet tool restore; $name=$env:MIGRATION_NAME; if ([string]::IsNullOrWhiteSpace($name)) { $name = \"NewMigration\" }; dotnet ef migrations add $name --project packages/Carvery.Database/Carvery.Database.csproj --startup-project apps/Carvery.Api/Api.csproj --output-dir Migrations"'

[tasks."api:run"]
description = "Run the API"
dir = "apps/Carvery.Api"
run = "mise run run"

[tasks."api:install"]
description = "Restore API .NET dependencies and tools"
dir = "apps/Carvery.Api"
run = 'powershell -NoProfile -Command "dotnet restore Api.csproj; dotnet tool restore"'

[tasks."api:build"]
description = "Build the API"
dir = "apps/Carvery.Api"
run = "mise run build"

[tasks."api:watch"]
description = "Run the API with hot reload"
dir = "apps/Carvery.Api"
run = "mise run watch"

[tasks."api:clean"]
description = "Stop stale API process and clean API artifacts"
dir = "apps/Carvery.Api"
run = "mise run clean"

[tasks."web:dev"]
description = "Run the Next.js frontend in dev mode"
dir = "apps/carvery"
run = "npm run dev"

[tasks."web:install"]
description = "Install frontend npm dependencies"
dir = "apps/carvery"
run = "npm install"

[tasks."web:build"]
description = "Build the Next.js frontend"
dir = "apps/carvery"
run = "npm run build"

[tasks."web:start"]
description = "Start the Next.js frontend"
dir = "apps/carvery"
run = "npm run start"

[tasks."web:lint"]
description = "Lint the Next.js frontend"
dir = "apps/carvery"
run = "npm run lint"

[tasks."web:clean"]
description = "Clean Next.js build artifacts"
dir = "apps/carvery"
run = 'powershell -NoProfile -Command "if (Test-Path .next) { Remove-Item .next -Recurse -Force }"'
