services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: carvery-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - carvery-sql-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  carvery-sql-data: